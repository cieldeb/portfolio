<div class="section-wrapper{% if include.bg == 'blur' %} patterned-bg{% endif %}">
    <section class="section" id="links">
        <div class="full-width">
            <div class="section-heading" id="links-text">Liens utiles</div>

            <!-- entries come from _data/links.yml, add a link there rather than here -->
            <div class="links-grid">
                {% for link in site.data.links %}
                <a class="semi-transparent-button with-border white-button links-item" href="{{ link.url }}" target="_blank" rel="noopener noreferrer">
                    <i class="{{ link.icon }}"></i> {{ link.label }}
                </a>
                {% endfor %}
            </div>
        </div>
    </section>
</div>
