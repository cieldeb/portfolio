<div class="section-wrapper">
    <section class="section printing" id="3dprinting">
        <div class="full-width">
            <div class="section-heading" id="printing-text">Impression 3D</div>

            <div class="printing-grid">
                <div class="printing-profiles">
                    <h3 class="center-align skills-subsection">Mes profils</h3>
                    <ul class="profile-list">
                        <li>
                            <a class="semi-transparent-button with-border white-button profile-link" href="{{ site.printables_url }}" target="_blank" rel="noopener noreferrer">
                                <i class="fas fa-cube"></i> Printables
                            </a>
                        </li>
                        <li>
                            <a class="semi-transparent-button with-border white-button profile-link" href="{{ site.thingiverse_url }}" target="_blank" rel="noopener noreferrer">
                                <i class="fas fa-cube"></i> Thingiverse
                            </a>
                        </li>
                        <li>
                            <a class="semi-transparent-button with-border white-button profile-link" href="{{ site.cults_url }}" target="_blank" rel="noopener noreferrer">
                                <i class="fas fa-cube"></i> Cults3D
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="printing-mosaic">
                    {% for photo in site.printing_photos %}
                    <div class="mosaic-item">
                        <img src="{{ photo }}" alt="Modèle 3D imprimé" loading="lazy">
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </section>
</div>
