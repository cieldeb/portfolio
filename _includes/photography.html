<div class="section-wrapper{% if include.bg == 'blur' %} patterned-bg{% endif %}">
    <section class="section printing photography" id="photography">
        <div class="full-width">
            <div class="section-heading" id="photography-text">Photographie</div>

            <div class="printing-grid">
                <div class="printing-profiles">
                    <!-- <h3 class="center-align skills-subsection">Mon profil</h3> -->
                    <ul class="profile-list">
                        <li>
                            <a class="semi-transparent-button with-border white-button profile-link" href="{{ site.photography_url }}" target="_blank" rel="noopener noreferrer">
                                <i class="fas fa-camera"></i> Portfolio photographique
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="printing-mosaic">
                    {% for photo in site.photography_photos %}
                    <div class="mosaic-item">
                        <img src="{{ photo }}" alt="Photographie personnelle" loading="lazy">
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </section>
</div>
