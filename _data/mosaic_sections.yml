# Data for the reusable mosaic-section.html include.
# Each key is a section: links on the left, a photo mosaic on the right.
# To add a new mosaic section: add an entry here, then
# {% include mosaic-section.html key="<key>" bg="white|blur" %} it from a layout
# (bg controls the section's background and is passed at the call site).
# profiles_title is optional — a small heading shown above that section's links;
# leave it out to show just the links.

coding:
  id: coding
  heading: Développement
  photo_alt: Capture d'écran d'un projet de développement
  profiles_title: Mes profils
  profiles:
    - url: "https://github.com/cieldeb"
      icon: fab fa-github
      label: GitHub
    - url: "https://codeberg.org/cieldeb"
      icon: fas fa-code-branch
      label: Codeberg
  photos:
