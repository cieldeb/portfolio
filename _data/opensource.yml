# Data for the "Logiciel libre" section (_includes/opensource.html).
# To add a contribution, add an entry here — the stats block above the grid
# and the badges are both generated from this list, nothing to update by hand.
#
# kind:   "pr" (default) counts towards the Pull requests / Mergées / Ouvertes
#         stats; "translation" (e.g. Weblate) doesn't, since it's not a PR.
# status: "merged" or "open" — picks the badge color (opensource-badge-<status>).
# badge:  optional override for the badge text. Leave unset to get the default
#         wording for the status ("Mergée"/"Ouverte"); set it for anything that
#         needs different wording, e.g. "Traductions".
contributions:
  - repo: Weblate
    url: "https://hosted.weblate.org/user/Ciel.deb/"
    kind: translation
    status: open
    badge: Traductions
    title: Contributions de traduction sur hosted.weblate.org

  - repo: DirectoryLister/DirectoryLister
    url: "https://github.com/DirectoryLister/DirectoryLister/pull/1525"
    status: merged
    title: Correction d'imprécisions dans la traduction française

